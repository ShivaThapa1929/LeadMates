<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="0.6" stop-color="#050816"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="75%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity="0.22"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="56" fill="url(#bg)"/>
  <circle cx="900" cy="210" r="420" fill="url(#glow)"/>

  <!-- diagonal stripes -->
  <g opacity="0.08" stroke="#e2e8f0" stroke-width="2">
    <path d="M-200 720L420 0"/>
    <path d="M0 720L620 0"/>
    <path d="M200 720L820 0"/>
    <path d="M400 720L1020 0"/>
    <path d="M600 720L1220 0"/>
  </g>

  <g transform="translate(96 88)">
    <rect x="0" y="0" width="1008" height="544" rx="44" fill="#0b0d10" opacity="0.6" stroke="url(#stroke)" stroke-width="2"/>

    <!-- icon bubble -->
    <g transform="translate(34 118)">
      <rect x="0" y="0" width="92" height="92" rx="26" fill="#3b82f6" opacity="0.16" stroke="#3b82f6" stroke-opacity="0.25"/>
      <!-- briefcase glyph -->
      <g transform="translate(18 22)" fill="none" stroke="#93c5fd" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 18h56c4 0 8 4 8 8v34c0 4-4 8-8 8H10c-4 0-8-4-8-8V26c0-4 4-8 8-8Z"/>
        <path d="M24 18v-6c0-4 3-8 7-8h14c4 0 7 4 7 8v6"/>
        <path d="M2 38h80" opacity="0.8"/>
        <path d="M40 34v12" opacity="0.9"/>
      </g>
    </g>

    <!-- title lines -->
    <g opacity="0.55" fill="#e2e8f0">
      <rect x="148" y="140" width="420" height="14" rx="7"/>
      <rect x="148" y="170" width="560" height="10" rx="5" opacity="0.75"/>
      <rect x="148" y="192" width="480" height="10" rx="5" opacity="0.55"/>
    </g>

    <!-- fake form grid -->
    <g transform="translate(34 270)" opacity="0.65">
      <rect x="0" y="0" width="460" height="62" rx="18" fill="#111827" stroke="#334155" stroke-opacity="0.5"/>
      <rect x="494" y="0" width="480" height="62" rx="18" fill="#111827" stroke="#334155" stroke-opacity="0.5"/>
      <rect x="0" y="86" width="974" height="150" rx="22" fill="#111827" stroke="#334155" stroke-opacity="0.5"/>
      <rect x="0" y="260" width="360" height="62" rx="18" fill="#111827" stroke="#334155" stroke-opacity="0.5"/>
      <rect x="394" y="260" width="580" height="62" rx="18" fill="#3b82f6" opacity="0.35"/>
    </g>

    <!-- label -->
    <text x="34" y="520" fill="#93c5fd" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="28" font-weight="800" letter-spacing="1">
      CAPTUREJOBS
    </text>
    <text x="34" y="552" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="16" font-weight="700" letter-spacing="2" opacity="0.8">
      JOB POSTING CONTROL SURFACE
    </text>
  </g>
</svg>

