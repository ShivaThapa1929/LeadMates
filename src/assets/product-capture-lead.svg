<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="70%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="56" fill="url(#bg)"/>
  <circle cx="280" cy="190" r="360" fill="url(#glow)"/>
  <circle cx="980" cy="610" r="320" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g opacity="0.08" stroke="#e2e8f0" stroke-width="1">
    <path d="M0 120H1200M0 240H1200M0 360H1200M0 480H1200M0 600H1200"/>
    <path d="M120 0V720M240 0V720M360 0V720M480 0V720M600 0V720M720 0V720M840 0V720M960 0V720M1080 0V720"/>
  </g>

  <!-- card -->
  <g transform="translate(96 88)">
    <rect x="0" y="0" width="1008" height="544" rx="44" fill="#0b0d10" opacity="0.6" stroke="url(#stroke)" stroke-width="2"/>
    <rect x="34" y="34" width="264" height="12" rx="6" fill="#3b82f6" opacity="0.65"/>
    <rect x="34" y="68" width="420" height="10" rx="5" fill="#94a3b8" opacity="0.45"/>

    <!-- icon bubble -->
    <g transform="translate(34 124)">
      <rect x="0" y="0" width="92" height="92" rx="26" fill="#3b82f6" opacity="0.16" stroke="#3b82f6" stroke-opacity="0.25"/>
      <!-- user-plus-ish glyph -->
      <g transform="translate(18 18)" fill="none" stroke="#93c5fd" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M28 34c10 0 18-8 18-18S38-2 28-2 10 6 10 16s8 18 18 18Z" opacity="0.95"/>
        <path d="M6 68c6-14 20-22 36-22s30 8 36 22" opacity="0.9"/>
        <path d="M78 14v28"/>
        <path d="M64 28h28"/>
      </g>
    </g>

    <!-- content lines -->
    <g opacity="0.55" fill="#e2e8f0">
      <rect x="148" y="142" width="360" height="14" rx="7"/>
      <rect x="148" y="170" width="520" height="10" rx="5" opacity="0.75"/>
      <rect x="148" y="192" width="440" height="10" rx="5" opacity="0.55"/>
    </g>

    <!-- bottom chips -->
    <g transform="translate(34 394)">
      <rect x="0" y="0" width="240" height="54" rx="18" fill="#1f2937" opacity="0.55" stroke="#334155" stroke-opacity="0.55"/>
      <rect x="18" y="18" width="84" height="18" rx="9" fill="#3b82f6" opacity="0.45"/>
      <rect x="110" y="20" width="112" height="14" rx="7" fill="#94a3b8" opacity="0.45"/>
    </g>

    <g transform="translate(290 394)">
      <rect x="0" y="0" width="272" height="54" rx="18" fill="#1f2937" opacity="0.45" stroke="#334155" stroke-opacity="0.45"/>
      <rect x="18" y="20" width="210" height="14" rx="7" fill="#94a3b8" opacity="0.35"/>
    </g>

    <!-- label -->
    <text x="34" y="520" fill="#93c5fd" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="28" font-weight="800" letter-spacing="1">
      CAPTURELEAD
    </text>
    <text x="34" y="552" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial" font-size="16" font-weight="700" letter-spacing="2" opacity="0.8">
      IDENTITY INGESTION TERMINAL
    </text>
  </g>

  <!-- vignette -->
  <rect width="1200" height="720" rx="56" fill="#000" opacity="0.22" filter="url(#soft)"/>
</svg>

